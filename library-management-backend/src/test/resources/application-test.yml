spring:
  datasource:
    url: jdbc:h2:mem:library_management_test;MODE=MySQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false
    open-in-view: false
  sql:
    init:
      mode: always

logging:
  level:
    com.library: INFO
    org.springframework.security: INFO
